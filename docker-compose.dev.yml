services:
  postgres:
    image: postgres:17
    container_name: stemma-postgres
    env_file:
      - .env
    ports:
      - "${PORT_POSTGRES:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U stemma -d stemma"]
      interval: 30s
      timeout: 3s
      retries: 3
    networks:
      - stemma-network
    restart: unless-stopped

networks:
  stemma-network:

volumes:
  postgres-data:
